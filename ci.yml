name: SIN Editor Professional Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # --- 1. بناء الأندرويد (الـ APK المنتظر) ---
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Android Tools
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" "build-tools;33.0.2"

      - name: Prepare Resources (Icon)
        run: |
          # العراب جهز الأيقونة، هسة نربطها بالنظام
          mkdir -p android/res/mipmap
          cp res/sinoicon.png android/res/mipmap/icon.png

      - name: Configure & Build APK
        run: |
          mkdir build-android && cd build-android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_SDK_ROOT}/ndk/25.2.9519653/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DPLATFORM=Android \
            -DCMAKE_BUILD_TYPE=Release
          make

      - name: Upload SINO APK
        uses: actions/upload-artifact@v4
        with:
          name: SIN-Editor-Android-APK
          path: build-android/*.apk

  # --- 2. بناء الويندوز ---
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure & Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
      - name: Upload Windows Exe
        uses: actions/upload-artifact@v4
        with:
          name: SIN-Editor-Windows
          path: build/Release/*.exe

  # --- 3. بناء اللينكس ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev
      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: SIN-Editor-Linux
          path: build/sin_editor
