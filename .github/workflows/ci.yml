name: SIN Editor CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
jobs:

# ---- Linux ------------------------------------------------------------------
  linux:
    name: Build -- Linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ninja-build libgl1-mesa-dev libx11-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build-linux/_deps
          key: linux-raylib-5.0-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build-linux -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-linux --parallel

      - uses: actions/upload-artifact@v4
        with:
          name: sin_editor-linux
          path: build-linux/sin_editor
          if-no-files-found: error

# ---- Windows ----------------------------------------------------------------
  windows:
    name: Build -- Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Cache FetchContent
        uses: actions/cache@v4
        with:
          path: build-windows/_deps
          key: windows-raylib-5.0-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: cmake -B build-windows -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-windows --config Release --parallel

      - uses: actions/upload-artifact@v4
        with:
          name: sin_editor-windows
          path: build-windows/Release/sin_editor.exe
          if-no-files-found: error

# ---- Android APK ------------------------------------------------------------
  android:
    name: Build -- Android APK
    runs-on: ubuntu-22.04

    env:
      NDK_VER:        "25.2.9519653"
      BUILD_TOOLS:    "34.0.0"
      COMPILE_SDK:    "34"
      MIN_SDK:        "21"
      ABI:            "arm64-v8a"

    steps:
      - uses: actions/checkout@v4

      # Java is needed for apksigner / keytool
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Official Android SDK setup action (sets ANDROID_SDK_ROOT)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and build-tools
        run: |
          sdkmanager \
            "ndk;${NDK_VER}" \
            "build-tools;${BUILD_TOOLS}" \
            "platforms;android-${COMPILE_SDK}"

      # Pre-clone Raylib so FetchContent does not need internet during CMake build
      - name: Cache Raylib source
        uses: actions/cache@v4
        with:
          path: /tmp/raylib-src
          key: raylib-src-5.0

      - name: Fetch Raylib 5.0
        run: |
          if [ ! -d /tmp/raylib-src/.git ]; then
            git clone --depth 1 --branch 5.0 \
              https://github.com/raysan5/raylib.git /tmp/raylib-src
          fi

      # Build native .so
      - name: CMake configure (Android)
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${NDK_VER}"
          cmake -B build-android \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_PATH/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI="${ABI}" \
            -DANDROID_PLATFORM="android-${MIN_SDK}" \
            -DANDROID_STL="c++_static" \
            -DCMAKE_BUILD_TYPE=Release \
            -DFETCHCONTENT_SOURCE_DIR_RAYLIB=/tmp/raylib-src

      - name: CMake build (Android)
        run: cmake --build build-android --parallel

      # Locate the .so (CMake may put it in different subdirs depending on version)
      - name: Locate libsin_editor.so
        run: |
          SO=$(find build-android -name "libsin_editor.so" -type f | head -1)
          echo "Found SO: $SO"
          if [ -z "$SO" ]; then echo "ERROR: .so not found"; exit 1; fi
          echo "SO_PATH=$SO" >> $GITHUB_ENV

      # Write AndroidManifest.xml
      - name: Write AndroidManifest.xml
        run: |
          cat > AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.sineditor.app"
              android:versionCode="1"
              android:versionName="0.2">

            <uses-sdk
                android:minSdkVersion="21"
                android:targetSdkVersion="34" />

            <uses-feature
                android:glEsVersion="0x00020000"
                android:required="true" />

            <application
                android:label="SIN Editor"
                android:hasCode="false">

              <activity
                  android:name="android.app.NativeActivity"
                  android:label="SIN Editor"
                  android:screenOrientation="landscape"
                  android:configChanges="orientation|keyboardHidden|screenSize"
                  android:exported="true">

                <meta-data
                    android:name="android.app.lib_name"
                    android:value="sin_editor" />

                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          MANIFEST

      # Assemble APK using aapt2 + zip
      - name: Package APK
        run: |
          BT="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS}"
          JAR="$ANDROID_SDK_ROOT/platforms/android-${COMPILE_SDK}/android.jar"

          # aapt2 link: creates APK with compiled manifest
          "$BT/aapt2" link \
            -o sin_editor_unsigned.apk \
            --manifest AndroidManifest.xml \
            -I "$JAR" \
            --min-sdk-version "${MIN_SDK}" \
            --target-sdk-version "${COMPILE_SDK}" \
            --version-code 1 \
            --version-name "0.2"

          # Add native library  (must be at lib/<abi>/ inside the APK zip)
          mkdir -p lib/"${ABI}"
          cp "$SO_PATH" lib/"${ABI}"/libsin_editor.so
          zip -r sin_editor_unsigned.apk lib/

      # zipalign
      - name: Align APK
        run: |
          BT="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS}"
          "$BT/zipalign" -v 4 sin_editor_unsigned.apk sin_editor_aligned.apk

      # Generate debug keystore + sign
      - name: Sign APK
        run: |
          BT="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS}"

          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -keypass android -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

          "$BT/apksigner" sign \
            --ks debug.keystore \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out sin_editor_debug.apk \
            sin_editor_aligned.apk

      - name: Verify APK
        run: |
          BT="$ANDROID_SDK_ROOT/build-tools/${BUILD_TOOLS}"
          "$BT/apksigner" verify --verbose sin_editor_debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: sin_editor-android-arm64
          path: sin_editor_debug.apk
          if-no-files-found: error
